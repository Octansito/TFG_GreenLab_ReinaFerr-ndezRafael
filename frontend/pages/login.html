<!-- Pagina login que contiene la estructura -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenLab | Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/auth.css" />
  </head>
  <body data-pagina="login">
    <main class="contenedor-auth">
      <section class="panel-visual">
        <div class="panel-visual__interior">
          <h1>
            Controla accesos, equipos y checklists desde un único punto de
            entrada.
          </h1>
        </div>
      </section>

      <section class="panel-formulario">
        <div class="tarjeta-formulario">
          <div class="cabecera-formulario">
            <img
              class="logo-marca"
              src="/assets/LogoGreenLab.png"
              alt="Logo de GreenLab"
            />
            <div>
              <p class="etiqueta etiqueta--dark">Acceso</p>
              <h2>Iniciar sesión</h2>
            </div>
          </div>

          <form class="formulario-auth" id="formulario-login" novalidate>
            <label class="campo">
              <span class="etiqueta-campo">
                Correo electrónico:
                <span class="marca-obligatoria" aria-hidden="true">*</span>
              </span>
              <input
                type="email"
                name="email"
                placeholder="nombre@greenlab.com"
                autocomplete="email"
                required
              />
            </label>

            <label class="campo">
              <span class="etiqueta-campo">
                Contraseña:
                <span class="marca-obligatoria" aria-hidden="true">*</span>
              </span>
              <div class="campo-contrasena">
                <input
                  id="contrasena-login"
                  type="password"
                  name="password"
                  placeholder="Introduce tu contraseña"
                  autocomplete="current-password"
                  required
                />
                <button
                  class="alternar-contrasena"
                  type="button"
                  data-contrasena-objetivo="contrasena-login"
                  aria-label="Mostrar contraseña"
                  aria-pressed="false"
                >
                  <img
                    class="icono-contrasena icono-contrasena--cerrado"
                    src="/assets/eye-off-svgrepo-com.svg"
                    alt=""
                    aria-hidden="true"
                  />
                  <img
                    class="icono-contrasena icono-contrasena--abierto"
                    src="/assets/eye-on-svgrepo-com.svg"
                    alt=""
                    aria-hidden="true"
                  />
                </button>
              </div>
            </label>

            <button class="boton boton--primario" type="submit">
              Acceder a GreenLab
            </button>
          </form>

          <div
            class="mensaje-formulario"
            id="mensaje-login"
            aria-live="polite"
          ></div>

          <div class="pie-formulario">
            <p>¿Aún no tienes cuenta?</p>
            <a class="boton boton--secundario" href="/register"
              >Crear usuario</a
            >
          </div>
        </div>
      </section>
    </main>

    <script src="/services/auth.js"></script>
  </body>
</html>
